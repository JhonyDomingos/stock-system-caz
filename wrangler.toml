# Configuração Cloudflare Workers para Stock System CAZ
# Documentation: https://hub.nuxt.com/docs/getting-started/deploy#self-hosted

name = "stock-system-caz"
compatibility_date = "2025-03-05"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages
pages_build_output_dir = ".output/public"

# =============================================================================
# RECURSOS CLOUDFLARE
# =============================================================================

# D1 Database - Para armazenar dados (produtos, fornecedores, etc.)
[[d1_databases]]
binding = "DB"
database_name = "stock-system-caz-db"
database_id = "37451a42-6465-427f-8e3d-01b87e0ee226"

# KV Namespace - Para cache e sessões
[[kv_namespaces]]
binding = "KV"
id = "50d823274aba42f3b646076b5b72fd3d"

# R2 Bucket - Para armazenamento de arquivos (opcional)
# [[r2_buckets]]
# binding = "BLOB"
# bucket_name = "stock-system-caz-files"